# Ajustes de URL y despliegue
url: "https://blog.lqh2011.com"
baseurl: ""
# Tema: Utilizando el repositorio oficial de temas de GitHub Pages
remote_theme: pages-themes/minimal@v0.2.0
# Plugins soportados nativamente por GitHub Pages
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag   
  - jekyll-paginate
  - jekyll-sitemap
# Renderizado de Markdown (configurado para precisión académica/técnica)
markdown: kramdown
kramdown:
  input: GFM        # GitHub Flavored Markdown
  hard_wrap: false
  auto_ids: true    # Genera IDs para enlaces a secciones automáticos
# Configuración de Paginación
# Importante: Requiere que tu blog tenga un listado central que soporte esta lógica
paginate: 5
paginate_path: "/blog/page:num/"
# Metadatos del Sitio
title: "Blog de Jesús"
description: "Reflexiones sobre ciencia, política y literatura de un chino que habla castellano."
lang: "es-ES"
timezone: "Asia/Shanghai"
# Datos del Autor
author:
  name: "Jesús Luo"
  bio: "Un chino que habla castellano. Investigador político e interesado en matemáticas, física y poesía."
  location: "Nanjing, China"
  url: "https://lqh2011.com"
email: jesus@lqh2011.com
# Redes Sociales (Compatibles con la mayoría de layouts SEO-Tag)
twitter_username: LQH_2011 # Si lo tienes, se usa para Meta-Tags
github_username: LQH-2011
social_links:
  - name: Discord
    url: https://discord.gg/swQTTjxg
  - name: GitHub
    url: https://github.com/LQH-2011

permalink: /:year/:month/:day/:title/